version: '2.1'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: maks-postgis
    environment:
      POSTGRES_DB: maks
      POSTGRES_USER: maks
      POSTGRES_PASSWORD: maks
    ports:
      - "15439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maks -d maks"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: maks-api
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: maks
      POSTGRES_USER: maks
      POSTGRES_PASSWORD: maks
    ports:
      - "18080:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api:/app

  etl:
    build:
      context: ./etl
    container_name: maks-etl
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: maks
      POSTGRES_USER: maks
      POSTGRES_PASSWORD: maks
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./etl:/etl
    working_dir: /etl
    entrypoint: ["/bin/bash"]

volumes:
  pgdata:

